<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <title>MQTT recibir</title>
</head>

<body>
    <img id="receivedImage" />

    <script type="text/javascript">
        // MQTT connection parameters
        var hostname = "mqtt-dashboard.com";
        var port = 8884;
        var clientId = "clientId-kIvSC5zoI4" + new Date().getUTCMilliseconds();
        var username = "webclient";
        var password = "Super$icher123";
        var topic = "imageTopic";

        // MQTT client initialization
        var mqttClient = new Paho.MQTT.Client(hostname, port, clientId);
        mqttClient.onMessageArrived = MessageArrived;
        mqttClient.onConnectionLost = ConnectionLost;
        Connect();

        // Connect to MQTT broker
        function Connect() {
            mqttClient.connect({
                onSuccess: Connected,
                onFailure: ConnectionFailed,
                keepAliveInterval: 10,
                userName: username,
                useSSL: true,
                password: password
            });
        }

        // Successful connection callback
        function Connected() {
            console.log("Connected");
            mqttClient.subscribe(topic);
        }

        // Connection failure callback
        function ConnectionFailed(res) {
            console.log("Connect failed: " + res.errorMessage);
        }

        // Connection lost callback
        function ConnectionLost(res) {
            if (res.errorCode != 0) {
                console.log("Connection lost: " + res.errorMessage);
                Connect();
            }
        }

        // Incoming message processing callback
        function MessageArrived(message) {
            console.log("Message received");
            // Update lastReceivedImage
            var imageData = message.payloadString;
            updateLastReceivedImage(imageData);
            displayImage();
        }

        // Update lastReceivedImage in local storage
        function updateLastReceivedImage(imageData) {
            localStorage.setItem("lastReceivedImage", imageData);
        }

        // Display received image
        function displayImage() {
            var receivedImage = document.getElementById("receivedImage");
            // Retrieve lastReceivedImage from local storage
            var lastReceivedImage = localStorage.getItem("lastReceivedImage");
            if (lastReceivedImage) {
                receivedImage.src = lastReceivedImage;
            }
        }
    </script>
</body>

</html>
